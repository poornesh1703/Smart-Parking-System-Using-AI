{% extends 'base.html' %}
{% block title %}Sign up{% endblock %}

{% block content %}
<style>
  :root { --primary:#2563eb; --primary-dark:#1d4ed8; --bg:#0f172a; --text:#f1f5f9; --muted:#94a3b8; }
  .spai-page{font-family:"Inter",sans-serif;background:#0f172a;color:#f1f5f9}
  .spai-minvh{min-height:100vh}
  .signup-wrap{min-height:inherit;display:flex;align-items:center;justify-content:center;padding:32px 16px}
  .signup-box{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));
    border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:2rem;width:100%;max-width:420px;box-shadow:0 14px 36px rgba(0,0,0,.55)}
  h1{text-align:center;margin-bottom:1.2rem;font-size:1.6rem;font-weight:700}
  form{display:grid;gap:1rem}
  label{font-weight:600;font-size:.92rem}
  input{width:100%;padding:.85rem .95rem;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:#101827;color:#fff;outline:none}
  input:focus{border-color:#5b8efb;box-shadow:0 0 0 4px rgba(37,99,235,.35)}
  button{background:#2563eb;color:#fff;border:none;padding:.9rem 1.1rem;border-radius:12px;font-weight:700;cursor:pointer;box-shadow:0 10px 24px rgba(0,0,0,.35);transition:background .2s,transform .12s}
  button:hover{background:#1d4ed8;transform:translateY(-1px)}
  p{text-align:center;margin-top:1rem;color:#94a3b8;font-size:.95rem}
  p a{color:#93c5fd;text-decoration:none}
  p a:hover{ text-decoration:underline }
</style>

<div class="spai-page spai-minvh">
  <div class="signup-wrap">
    <div class="signup-box">
      <h1>Create your account</h1>
      <form method="post">
        <div>
          <label for="name">Name</label>
          <input id="name" type="text" name="name" placeholder="Full name" required />
        </div>
        <div>
          <label for="email">Email</label>
          <input id="email" type="email" name="email" value="{{ preset_email }}" placeholder="you@example.com" required />
        </div>
        <div>
          <label for="password">Password</label>
          <input id="password" type="password" name="password" required />
        </div>
        <button type="submit">Sign up</button>
      </form>
      <p>Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a>.</p>
    </div>
  </div>
</div>
{% endblock %}
